<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Congregaciones · Mexicali</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;font-size:16px}
body{font-family:"DM Sans",sans-serif;background:#08090d;color:#f0ede8;height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
:root{
  --gold:#c9a84c;--gold-light:#e8cb7a;--gold-dim:rgba(201,168,76,.14);--gold-glow:rgba(201,168,76,.32);
  --ink:#08090d;--ink2:#0f1018;--ink3:#171923;--ink4:#1e2130;
  --line:rgba(201,168,76,.2);--line2:rgba(255,255,255,.07);
  --text:#f0ede8;--text2:#b8b4ad;--text3:#6e6b65;
  --warn:#e8a44a;--radius:14px;--shadow:0 20px 48px rgba(0,0,0,.6)
}

/* ── HEADER ── */
.header{flex-shrink:0;background:var(--ink2);padding:16px 20px 14px;display:flex;align-items:center;gap:13px;border-bottom:1px solid var(--line);position:relative;z-index:20}
.header::after{content:"";position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.header-logo{width:42px;height:42px;border-radius:11px;flex-shrink:0;background:linear-gradient(135deg,var(--gold) 0%,#7a5c1e 100%);display:flex;align-items:center;justify-content:center;font-size:21px;box-shadow:0 0 20px var(--gold-glow)}
.header-titles{flex:1;min-width:0}
.header-titles h1{font-family:"Cormorant Garamond",serif;font-size:22px;font-weight:700;letter-spacing:.4px;color:var(--text);line-height:1}
.header-titles p{font-size:11px;font-weight:500;letter-spacing:1.6px;text-transform:uppercase;color:var(--gold);margin-top:3px;opacity:.85}
.header-badge{flex-shrink:0;background:var(--gold-dim);border:1px solid var(--line);border-radius:20px;padding:5px 13px;font-size:12px;font-weight:700;color:var(--gold-light);letter-spacing:.3px;white-space:nowrap;transition:all .3s}

/* ── TAB BAR (2 rows, all visible, no scroll) ── */
.tabbar{flex-shrink:0;background:var(--ink2);border-bottom:1px solid var(--line2);padding:8px 12px}
.tab-row{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.tab{padding:9px 4px;border-radius:24px;font-size:11.5px;font-weight:600;letter-spacing:.05px;cursor:pointer;border:1px solid transparent;color:var(--text3);background:transparent;transition:all .22s cubic-bezier(.4,0,.2,1);user-select:none;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tab:hover{color:var(--text2);background:var(--ink4)}
.tab.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-light)}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:310px;flex-shrink:0;background:var(--ink2);border-right:1px solid var(--line2);display:flex;flex-direction:column;overflow:hidden}
.sidebar-search{padding:13px 13px 9px;flex-shrink:0;border-bottom:1px solid var(--line2)}
.search-wrap{position:relative}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text3);pointer-events:none}
.search-input{width:100%;background:var(--ink3);border:1px solid var(--line2);border-radius:30px;padding:11px 14px 11px 40px;font-family:"DM Sans",sans-serif;font-size:15px;font-weight:400;color:var(--text);outline:none;-webkit-appearance:none;transition:border-color .2s,box-shadow .2s}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim)}
.sidebar-count{padding:10px 17px 5px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);flex-shrink:0}
.cong-list{overflow-y:auto;flex:1;padding:4px 9px 20px;-webkit-overflow-scrolling:touch}
.cong-list::-webkit-scrollbar{width:3px}
.cong-list::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}

/* ── CONG ITEM ── */
.cong-item{display:flex;align-items:center;gap:12px;padding:14px 13px;border-radius:13px;margin-bottom:5px;cursor:pointer;border:1px solid transparent;transition:all .2s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.cong-item::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);border-radius:3px 0 0 3px;opacity:0;transform:scaleY(0);transition:all .2s cubic-bezier(.4,0,.2,1)}
.cong-item:hover{background:var(--ink3);border-color:var(--line2)}
.cong-item:hover::before{opacity:.5;transform:scaleY(1)}
.cong-item.active{background:var(--gold-dim);border-color:var(--gold)}
.cong-item.active::before{opacity:1;transform:scaleY(1)}
.cong-icon{width:40px;height:40px;border-radius:10px;flex-shrink:0;background:var(--ink4);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .2s}
.cong-item.active .cong-icon{background:var(--gold-dim);border-color:var(--line)}
.cong-info{flex:1;min-width:0}
.cong-nombre{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cong-item.active .cong-nombre{color:var(--gold-light)}
.cong-zona{font-size:11px;font-weight:500;color:var(--text3);margin-top:2px;letter-spacing:.2px}
.cong-arrow{font-size:18px;color:var(--text3);opacity:0;transform:translateX(-4px);transition:all .2s;line-height:1}
.cong-item:hover .cong-arrow,.cong-item.active .cong-arrow{opacity:1;transform:translateX(0);color:var(--gold)}
.pending-pip{width:8px;height:8px;border-radius:50%;background:var(--warn);flex-shrink:0;box-shadow:0 0 8px var(--warn)}

/* ── SALON GROUP (por salón view) ── */
.salon-group{margin-bottom:4px}
.salon-header{display:flex;align-items:center;gap:10px;padding:10px 13px 8px;cursor:pointer;user-select:none}
.salon-header-icon{width:34px;height:34px;border-radius:9px;background:var(--gold-dim);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.salon-header-info{flex:1;min-width:0}
.salon-header-name{font-size:13px;font-weight:700;color:var(--gold-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.salon-header-count{font-size:11px;color:var(--text3);margin-top:1px;letter-spacing:.2px}
.salon-chevron{font-size:13px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.salon-group.open .salon-chevron{transform:rotate(90deg)}
.salon-congs{display:none;padding:0 9px 6px 52px}
.salon-group.open .salon-congs{display:block}
.salon-cong-item{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;margin-bottom:3px;cursor:pointer;border:1px solid transparent;transition:all .18s}
.salon-cong-item:hover{background:var(--ink3);border-color:var(--line2)}
.salon-cong-item.active{background:var(--gold-dim);border-color:var(--gold)}
.salon-cong-dot{width:6px;height:6px;border-radius:50%;background:var(--line);flex-shrink:0;transition:background .18s}
.salon-cong-item.active .salon-cong-dot{background:var(--gold)}
.salon-cong-name{font-size:13px;font-weight:600;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.salon-cong-item.active .salon-cong-name{color:var(--gold-light)}
.salon-divider{height:1px;background:var(--line2);margin:2px 9px 6px}

/* ── DETAIL ── */
.detail{flex:1;overflow-y:auto;background:var(--ink);-webkit-overflow-scrolling:touch}
.detail::-webkit-scrollbar{width:3px}
.detail::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}

/* EMPTY */
.empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px;text-align:center}
.empty-ring{width:92px;height:92px;border-radius:50%;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:36px;animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--gold-dim)}50%{box-shadow:0 0 0 14px transparent}}
.empty h2{font-family:"Cormorant Garamond",serif;font-size:26px;font-weight:700;color:var(--text2);letter-spacing:.4px}
.empty p{font-size:14px;color:var(--text3);max-width:220px;line-height:1.7}

/* DETAIL CARD */
.detail-wrap{padding:22px;max-width:680px;animation:fadeUp .28s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.hero{border-radius:20px;overflow:hidden;margin-bottom:16px;position:relative;background:linear-gradient(135deg,#0e1a10 0%,#0a0e1a 50%,#110e08 100%);border:1px solid var(--line);box-shadow:var(--shadow)}
.hero-glow{position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,var(--gold-glow) 0%,transparent 70%);pointer-events:none}
.hero-pattern{position:absolute;inset:0;opacity:.04;background-image:repeating-linear-gradient(45deg,var(--gold) 0,var(--gold) 1px,transparent 0,transparent 50%);background-size:20px 20px;pointer-events:none}
.hero-body{padding:26px 26px 22px;position:relative;z-index:1}
.hero-eyebrow{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:9px;display:flex;align-items:center;gap:8px}
.hero-eyebrow::before{content:"";display:block;width:20px;height:1px;background:var(--gold)}
.hero-title{font-family:"Cormorant Garamond",serif;font-size:34px;font-weight:700;line-height:1.1;color:var(--text);letter-spacing:.3px}
.hero-zona{margin-top:11px;display:inline-flex;align-items:center;gap:6px;background:var(--gold-dim);border:1px solid var(--line);border-radius:20px;padding:5px 13px;font-size:12px;font-weight:600;color:var(--gold-light);letter-spacing:.5px}

.info-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:16px}
.info-card{background:var(--ink2);border:1px solid var(--line2);border-radius:var(--radius);padding:17px 19px;display:flex;gap:13px;align-items:flex-start;transition:border-color .2s}
.info-card:hover{border-color:var(--line)}
.info-card-icon{width:40px;height:40px;border-radius:10px;flex-shrink:0;background:var(--gold-dim);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:17px}
.info-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.info-value{font-size:15px;font-weight:500;color:var(--text);line-height:1.55}
.info-value a{color:var(--gold-light);text-decoration:none;font-weight:600}

.map-card{background:var(--ink2);border:1px solid var(--line2);border-radius:var(--radius);overflow:hidden;margin-bottom:18px}
.map-header{padding:13px 17px 11px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line2)}
.map-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3)}
.map-open-btn{font-size:12px;font-weight:700;color:var(--gold);cursor:pointer;background:none;border:none;font-family:"DM Sans",sans-serif;display:flex;align-items:center;gap:3px;-webkit-appearance:none;padding:0}
.map-open-btn:hover{opacity:.7}
.map-frame{width:100%;height:190px;position:relative;cursor:pointer;overflow:hidden;background:linear-gradient(135deg,#0d1f1a 0%,#0a1020 100%);display:flex;align-items:center;justify-content:center}
.map-thumb-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px;text-align:center;pointer-events:none}
.map-pin{font-size:36px;filter:drop-shadow(0 0 12px var(--gold-glow))}
.map-coords{font-size:12px;font-weight:600;color:var(--gold-light);letter-spacing:.5px;font-family:"DM Sans",sans-serif;opacity:.8}
.map-tap{font-size:12px;color:var(--text3);font-family:"DM Sans",sans-serif}
.map-overlay{position:absolute;inset:0;background:rgba(8,9,13,0);display:flex;align-items:center;justify-content:center;transition:background .25s}
.map-frame:hover .map-overlay,.map-frame:active .map-overlay{background:rgba(8,9,13,.6)}
.map-overlay-pill{background:var(--gold);color:#000;padding:12px 24px;border-radius:30px;font-weight:700;font-size:13px;letter-spacing:.3px;display:flex;align-items:center;gap:6px;box-shadow:0 4px 20px rgba(0,0,0,.5);opacity:0;transform:scale(.9) translateY(4px);transition:all .25s cubic-bezier(.4,0,.2,1)}
.map-frame:hover .map-overlay-pill,.map-frame:active .map-overlay-pill{opacity:1;transform:scale(1) translateY(0)}

.pending-card{background:rgba(232,164,74,.07);border:1px solid rgba(232,164,74,.25);border-radius:var(--radius);padding:17px 19px;display:flex;gap:13px;align-items:flex-start;margin-bottom:18px}
.pending-card-icon{font-size:22px;flex-shrink:0}
.pending-card p{font-size:14px;font-weight:500;color:var(--warn);line-height:1.7}

.actions{display:flex;gap:9px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:7px;padding:13px 22px;border-radius:30px;font-family:"DM Sans",sans-serif;font-size:14px;font-weight:700;letter-spacing:.2px;cursor:pointer;border:none;text-decoration:none;transition:all .2s cubic-bezier(.4,0,.2,1);-webkit-appearance:none;position:relative;overflow:hidden}
.btn-primary{background:linear-gradient(135deg,var(--gold) 0%,#a07830 100%);color:#08090d;box-shadow:0 4px 18px var(--gold-glow)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 7px 26px var(--gold-glow)}
.btn-primary:active{transform:translateY(0)}
.btn-secondary{background:var(--ink3);color:var(--text);border:1px solid var(--line2)}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold-light);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--line2)}
.btn-ghost:hover{border-color:var(--text3);color:var(--text)}

/* MOBILE BACK */
.mob-back{display:none;align-items:center;gap:8px;padding:14px 17px;font-size:15px;font-weight:600;color:var(--gold);cursor:pointer;border-bottom:1px solid var(--line2);flex-shrink:0;background:var(--ink2)}
.no-results{padding:40px 20px;text-align:center;color:var(--text3);font-size:14px;line-height:1.7}

/* ── RESPONSIVE ── */
@media(max-width:720px){
  body{height:auto;min-height:100vh;overflow:auto}
  .sidebar{width:100%;height:auto;overflow:visible;border-right:none;border-bottom:1px solid var(--line2)}
  .cong-list{overflow:visible;max-height:none;height:auto}
  .layout{flex-direction:column;overflow:visible;height:auto}
  .detail{overflow:visible;height:auto;min-height:50vh}
  .layout.show-detail .sidebar{display:none}
  .layout.show-detail .detail{display:block}
  .mob-back{display:flex!important}
  .hero-title{font-size:28px}
  .header-titles h1{font-size:20px}
  .tab-row{display:flex;flex-wrap:wrap;justify-content:center;gap:5px}
  .tab{flex:0 0 calc(33.33% - 4px);font-size:11px;padding:8px 4px;min-width:0}
  .tab:nth-child(4),.tab:nth-child(5){flex:0 0 calc(48% - 3px)}
}
</style>
</head>

  <div class="header-titles">

  <div class="header-badge" id="headerBadge">92 congregaciones</div>
</header>

<nav class="tabbar">

    </div>
  </main>
</div>

// ── STATE ──────────────────────────────────────────────────────────
let currentTab = 'todas';
let selected   = null;

function getSalon(c){ return salones[c.salon]; }
function isPending(c){ return !getSalon(c).direccion; }

// ── FILTER ─────────────────────────────────────────────────────────
function getFiltered(){
  const q = (document.getElementById('searchInput').value||'').toLowerCase().trim();
  return congregaciones.filter(c => {
    const s = getSalon(c);
    const matchTab =
      currentTab === 'todas'      ? true :
      currentTab === 'pendientes' ? isPending(c) :
      currentTab === 'salon'      ? true :
      c.zona === currentTab;
    const matchQ = !q ||
      c.nombre.toLowerCase().includes(q) ||
      (s.direccion && s.direccion.toLowerCase().includes(q));
    return matchTab && matchQ;
  });
}

// ── RENDER LIST ─────────────────────────────────────────────────────
function renderList(){
  const list     = document.getElementById('congList');
  const filtered = getFiltered();

  // Count for badge — always shows count of current tab (not search)
  const tabCount = congregaciones.filter(c => {
    if(currentTab === 'todas') return true;
    if(currentTab === 'pendientes') return isPending(c);
    if(currentTab === 'salon') return true;
    return c.zona === currentTab;
  }).length;

  const tabLabel =
    currentTab === 'salon' ? tabCount + ' salones' :
    tabCount + ' congregaci' + (tabCount === 1 ? 'ón' : 'ones');
  document.getElementById('headerBadge').textContent = tabLabel;
  document.getElementById('sideCount').textContent =
    filtered.length + ' resultado' + (filtered.length !== 1 ? 's' : '');

  list.innerHTML = '';

  if(!filtered.length){
    list.innerHTML = '<div class="no-results">Sin resultados para tu búsqueda</div>';
    return;
  }

  // ── POR SALÓN VIEW ──
  if(currentTab === 'salon'){
    renderSalonGroups(filtered, list);
    return;
  }

  // ── SORTED ALPHABETICALLY ──
  const sorted = [...filtered].sort((a,b) => a.nombre.localeCompare(b.nombre, 'es'));

  sorted.forEach(c => {
    const pending  = isPending(c);
    const isActive = selected && selected.id === c.id;
    const icon     = c.zona === 'valle' ? '🌾' : '🏙';
    const div      = document.createElement('div');
    div.className  = 'cong-item' + (isActive ? ' active' : '');
    div.onclick    = () => selectCong(c);
    div.innerHTML  =
      '<div class="cong-icon">' + icon + '</div>' +
      '<div class="cong-info">' +
        '<div class="cong-nombre">' + c.nombre + '</div>' +
        '<div class="cong-zona">' + (c.zona === 'valle' ? 'Valle de Mexicali' : 'Ciudad de Mexicali') + '</div>' +
      '</div>' +
      (pending ? '<div class="pending-pip"></div>' : '<div class="cong-arrow">›</div>');
    list.appendChild(div);
  });
}

// ── RENDER SALON GROUPS ─────────────────────────────────────────────
function renderSalonGroups(filtered, list){
  // Group by salon key, sorted by salon display name
  const grupos = {};
  filtered.forEach(c => {
    if(!grupos[c.salon]) grupos[c.salon] = [];
    grupos[c.salon].push(c);
  });

  // Sort salon keys by display name
  const salonKeys = Object.keys(grupos).sort((a,b) =>
    (salonNames[a]||a).localeCompare(salonNames[b]||b, 'es')
  );

  // Update badge with salon count
  document.getElementById('headerBadge').textContent = salonKeys.length + ' salones';

  salonKeys.forEach(key => {
    const congs = grupos[key].sort((a,b) => a.nombre.localeCompare(b.nombre, 'es'));
    const sName = salonNames[key] || key;
    const s     = salones[key];
    const zona  = congs[0].zona === 'valle' ? '🌾' : '🏙';

    const group = document.createElement('div');
    group.className = 'salon-group';

    const header = document.createElement('div');
    header.className = 'salon-header';
    header.innerHTML =
      '<div class="salon-header-icon">' + zona + '</div>' +
      '<div class="salon-header-info">' +
        '<div class="salon-header-name">' + sName + '</div>' +
        '<div class="salon-header-count">' + congs.length + ' congregaci' + (congs.length === 1 ? 'ón' : 'ones') + '</div>' +
      '</div>' +
      '<div class="salon-chevron">›</div>';

    header.onclick = () => {
      group.classList.toggle('open');
    };

    const congsDiv = document.createElement('div');
    congsDiv.className = 'salon-congs';

    congs.forEach(c => {
      const isActive = selected && selected.id === c.id;
      const item = document.createElement('div');
      item.className = 'salon-cong-item' + (isActive ? ' active' : '');
      item.onclick = () => selectCong(c);
      item.innerHTML =
        '<div class="salon-cong-dot"></div>' +
        '<div class="salon-cong-name">' + c.nombre + '</div>' +
        '<div class="cong-arrow" style="opacity:' + (isActive ? '1' : '0') + ';transform:' + (isActive ? 'translateX(0)' : 'translateX(-4px)') + ';font-size:16px;color:var(--gold)">›</div>';
      congsDiv.appendChild(item);
    });

    const divider = document.createElement('div');
    divider.className = 'salon-divider';

    group.appendChild(header);
    group.appendChild(congsDiv);
    group.appendChild(divider);
    list.appendChild(group);
  });
}

// ── RENDER DETAIL ───────────────────────────────────────────────────
function renderDetail(c){
  const inner    = document.getElementById('detailInner');
  const s        = getSalon(c);
  const pending  = isPending(c);
  const zonaLabel = c.zona === 'valle' ? '🌾 Valle de Mexicali' : '🏙 Ciudad de Mexicali';
  const zonaTag   = c.zona === 'valle' ? 'Valle' : 'Ciudad';

  if(pending){
    inner.innerHTML =
      '<div class="detail-wrap">' +
        '<div class="hero">' +
          '<div class="hero-glow"></div><div class="hero-pattern"></div>' +
          '<div class="hero-body">' +
            '<div class="hero-eyebrow">Congregación · ' + zonaTag + '</div>' +
            '<div class="hero-title">' + c.nombre + '</div>' +
            '<div class="hero-zona">' + zonaLabel + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="pending-card">' +
          '<div class="pending-card-icon">⚠️</div>' +
          '<p>La dirección exacta de esta congregación está pendiente de registro. Se actualizará próximamente para activar la navegación en Google Maps.</p>' +
        '</div>' +
        '<div class="actions">' +
          '<a href="https://www.google.com/maps/search/' + encodeURIComponent(c.nombre + ' Mexicali Baja California') + '" target="_blank" class="btn btn-ghost">🔍 Buscar en Maps</a>' +
        '</div>' +
      '</div>';
    return;
  }

  const mapsNav  = 'https://www.google.com/maps/dir/?api=1&destination=' + s.lat + ',' + s.lng;
  const mapsOpen = s.maps || 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.direccion);
  inner.innerHTML =
    '<div class="detail-wrap">' +
      '<div class="hero">' +
        '<div class="hero-glow"></div><div class="hero-pattern"></div>' +
        '<div class="hero-body">' +
          '<div class="hero-eyebrow">Congregación · ' + zonaTag + '</div>' +
          '<div class="hero-title">' + c.nombre + '</div>' +
          '<div class="hero-zona">' + zonaLabel + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="info-grid">' +
        '<div class="info-card">' +
          '<div class="info-card-icon">📍</div>' +
          '<div class="info-card-body">' +
            '<div class="info-label">Dirección del Salón del Reino</div>' +
            '<div class="info-value">' + s.direccion + '</div>' +
          '</div>' +
        '</div>' +
        (s.phone ?
          '<div class="info-card">' +
            '<div class="info-card-icon">📞</div>' +
            '<div class="info-card-body">' +
              '<div class="info-label">Teléfono</div>' +
              '<div class="info-value"><a href="tel:' + s.phone + '">' + s.phone + '</a></div>' +
            '</div>' +
          '</div>'
        : '') +
      '</div>' +
      '<div class="map-card">' +
        '<div class="map-header">' +
          '<div class="map-title">Ubicación del salón</div>' +
          '<button class="map-open-btn" onclick="window.open(\'' + mapsOpen + '\',\'_blank\')">Abrir en Maps ›</button>' +
        '</div>' +
        '<div class="map-frame" onclick="window.open(\'' + mapsOpen + '\',\'_blank\')">' +
          '<div class="map-thumb-inner"><div class="map-pin">\ud83d\udccd</div><div class="map-coords">' + s.lat.toFixed(5) + ', ' + s.lng.toFixed(5) + '</div><div class="map-tap">Toca para abrir en Google Maps</div></div>' +
          '<div class="map-overlay"><div class="map-overlay-pill">\ud83d\uddfa Ver en Google Maps</div></div>' +
        '</div>' +
      '</div>' +
      '<div class="actions">' +
        '<a href="' + mapsNav + '" target="_blank" class="btn btn-primary">🧭 Cómo llegar</a>' +
        '<a href="' + mapsOpen + '" target="_blank" class="btn btn-secondary">🗺 Ver en Maps</a>' +
        (s.phone ? '<a href="tel:' + s.phone + '" class="btn btn-ghost">📞 Llamar</a>' : '') +
      '</div>' +
    '</div>';
}

// ── ACTIONS ──────────────────────────────────────────────────────────
function selectCong(c){
  selected = c;
  renderList();
  renderDetail(c);
  document.getElementById('layout').classList.add('show-detail');
  const det = document.getElementById('detail');
  if(det) det.scrollTop = 0;
  window.scrollTo({top:0, behavior:'smooth'});
}

function goBack(){
  document.getElementById('layout').classList.remove('show-detail');
  selected = null;
  renderList();
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = function(){
    currentTab = this.dataset.tab;
    selected   = null;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('detailInner').innerHTML =
      '<div class="empty">' +
        '<div class="empty-ring">🏛️</div>' +
        '<h2>Selecciona una congregación</h2>' +
        '<p>Elige cualquier congregación de la lista para ver su ubicación y cómo llegar.</p>' +
      '</div>';
    renderList();
  };
});

renderList();
</script>
</body>
</html>
